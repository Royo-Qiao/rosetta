name = "rosetta"
main = "src/index.ts"
compatibility_date = "2026-05-01"
workers_dev = true

[ai]
binding = "AI"

[[kv_namespaces]]
binding = "USAGE_KV"
id = "edcad6dfbae54ac4bfb638c52fdbf8bc"

[vars]
# Any Cloudflare Workers AI text model id. See /v1/models for the full list.
CF_AI_MODEL = "@cf/moonshotai/kimi-k2.7-code"
PUBLIC_BASE_URL = "https://rosetta.royo-dev.art"
# Set this to require Authorization: Bearer <token>. Leave empty to accept fake keys.
GATEWAY_AUTH_TOKEN = ""
MAX_BODY_BYTES = "2000000"

[[routes]]
pattern = "rosetta.royo-dev.art"
custom_domain = true
